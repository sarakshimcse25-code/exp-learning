<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skyline Properties</title>
</head>
<body>
    <center>
    <h2>Skyline Properties</h2>
    </center>

    <table border="1" width="100%">
    <tr>
        <!-- Sidebar -->
        <td width="25%" valign="top">
            <h3>Filter</h3>
            <label>Price:</label><br>
            
            <select>
                <option>All</option>
                <option>Below 50L</option>
                <option>50L - 1Cr</option>
                <option>Above 1Cr</option>
            </select>

         <label>BHK:</label><br>
            <select>
                <option>All</option>
                <option>1 BHK</option>
                <option>2 BHK</option>
                <option>3 BHK</option>
            </select>
        </td>
<!-- Properties -->
        <td valign="top">

            <h3>Properties</h3>

            <table border="1" width="100%">
                <tr>
                    <td>
                        <img src="https://images.unsplash.com/photo-1560185007-c5ca9d2c014d" width="50%">
                        <h4>2 BHK Apartment</h4>
                        <p>Price: ₹75 Lakhs</p>
                        <p>Location: Pune</p>
                        <p>Area: 900 sq.ft</p>
                    </td>

                    <td>
                        <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c" width="50%">
                        <h4>3 BHK Villa</h4>
                        <p>Price: ₹1.5 Crore</p>
                        <p>Location: Mumbai</p>
                        <p>Area: 2000 sq.ft</p>
                    </td>
                </tr>

            <tr>
                    <td>
                        <img src="https://images.unsplash.com/photo-1502672260266-1c1ef2d93688" width="50%">
                        <h4>1 BHK Flat</h4>
                        <p>Price: ₹40 Lakhs</p>
                        <p>Location: Nagpur</p>
                        <p>Area: 500 sq.ft</p>
                    </td>
             <td>
                        <!-- Empty cell for spacing -->
                    </td>

                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
